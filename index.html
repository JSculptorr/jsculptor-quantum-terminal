<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSculptor // MARKET_INTRUSION_OS</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --matrix-green: #00ff41;
            --dark-bg: #000a00;
            --terminal-gray: #1a1a1a;
            --alert-red: #ff3e3e;
            --glow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        body {
            background: var(--dark-bg);
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
            font-size: 12px;
        }

        /* Сканирующая линия (CRT эффект) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glass {
            background: rgba(0, 15, 0, 0.9);
            border: 1px solid var(--matrix-green);
            box-shadow: var(--glow);
            border-radius: 2px;
            display: flex;
            flex-direction: column;
        }

        /* LOGIN SCREEN */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { padding: 40px; border: 2px solid var(--matrix-green); text-align: left; width: 400px; box-shadow: 0 0 30px var(--matrix-green); }
        input { 
            background: transparent; border: none; border-bottom: 2px solid var(--matrix-green); 
            color: var(--matrix-green); padding: 10px; width: 100%; margin: 20px 0; outline: none; font-family: inherit;
        }
        button { 
            background: var(--matrix-green); color: #000; border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--matrix-green); }

        /* GRID LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 380px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* SYSTEM LOGS (LEFT) */
        .system-logs {
            font-size: 10px;
            overflow: hidden;
            padding: 10px;
            color: rgba(0, 255, 65, 0.6);
            display: flex;
            flex-direction: column-reverse;
            flex: 1;
        }

        /* MARKET MATRIX (CENTER) */
        .main-workspace { display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .matrix-container { flex: 1; overflow-y: auto; padding: 10px; }
        
        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .matrix-table th {
            position: sticky; top: 0; background: var(--dark-bg);
            padding: 10px; border-bottom: 1px solid var(--matrix-green);
            font-size: 10px; color: rgba(255,255,255,0.7);
        }
        .matrix-table td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }
        .coin-row:hover { background: rgba(0, 255, 65, 0.05); }

        /* SIGNALS (RIGHT) */
        .sidebar { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        #signals-container { flex: 1; overflow-y: auto; }

        .signal-card {
            padding: 15px; border: 1px solid var(--matrix-green);
            background: rgba(0, 40, 0, 0.4);
            position: relative;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .signal-card::before {
            content: "[ ANOMALY_DETECTED ]";
            position: absolute; top: -8px; left: 10px; background: var(--dark-bg);
            font-size: 9px; padding: 0 5px;
        }

        .type-long { color: #fff; text-shadow: 0 0 10px var(--matrix-green); }
        .type-short { color: var(--alert-red); text-shadow: 0 0 10px var(--alert-red); }

        h3, h4 { margin: 0; border-bottom: 1px solid var(--matrix-green); padding-bottom: 5px; margin-bottom: 10px; font-size: 14px; background: rgba(0,255,65,0.1); padding: 5px; }

        /* Scrollbar Hack */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--matrix-green); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <div>> SYSTEM: ACCESS_RESTRICTED</div>
            <div>> NODE: JSCULPTOR_TERMINAL_V3</div>
            <input type="password" id="pass" placeholder="ENTER_ENCRYPTION_KEY..." autofocus>
            <button onclick="login()">[ EXECUTE_ACCESS ]</button>
            <div id="login-status" style="margin-top: 10px; font-size: 12px;"></div>
        </div>
    </div>

    <div class="layout">
        <div class="glass">
            <h4>> SYSTEM_OS_LOGS</h4>
            <div class="system-logs" id="hacker-logs"></div>
        </div>

        <div class="main-workspace">
            <div class="glass matrix-container">
                <h4>> GLOBAL_MARKET_MATRIX (20_NODES)</h4>
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th>SYMBOL</th>
                            <th>PRICE_USDT</th>
                            <th>ROLL_CVD</th>
                            <th>SCORE</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body">
                        </tbody>
                </table>
            </div>
            
            <div class="glass" style="height: 120px; padding: 10px; font-size: 10px; overflow: hidden;">
                <h4>> RAW_DATA_STREAM</h4>
                <div id="order-flow-stream"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass" style="padding: 15px;">
                <h3>JS_ALGO_ULTIMATE</h3>
                <div id="status-bar">> STATUS: SCANNING_LIQUIDITY...</div>
            </div>
            <div id="signals-container"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const matrixData = {};

        // --- ДЕКОРАТИВНЫЕ ХАКЕРСКИЕ ЛОГИ ---
        const logLines = [
            "SCANNING BINANCE_FUTURES...",
            "CVD_ACCUMULATION_DETECTED",
            "BYPASSING FIREWALL_LEVEL_4...",
            "NEURAL_NET: ANALYZING_VAP...",
            "SFP_PATTERN_SEARCH: ACTIVE",
            "ABSORPTION_CLUSTER_FOUND",
            "RETRACING_INSTITUTIONAL_FOOTPRINTS...",
            "PING: 12ms | PACKET_LOSS: 0%",
            "ORDERBOOK_IMBALANCE: HIGH",
            "LIQUIDITY_SWEEP_CONFIRMED"
        ];

        function addHackerLog() {
            const container = document.getElementById('hacker-logs');
            const div = document.createElement('div');
            div.innerHTML = `> ${logLines[Math.floor(Math.random() * logLines.length)]}`;
            container.prepend(div);
            if (container.children.length > 40) container.lastChild.remove();
        }
        setInterval(addHackerLog, 1500);

        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({code}) 
            });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
            } else {
                document.getElementById('login-status').innerHTML = "!! ACCESS_DENIED !!";
                document.getElementById('login-status').style.color = "red";
            }
        }

        // ОБНОВЛЕНИЕ МАТРИЦЫ (ЦЕНТРАЛЬНАЯ ТАБЛИЦА)
        socket.on('matrix_update', (data) => {
            matrixData[data.s] = data;
            renderMatrix();
        });

        function renderMatrix() {
            const body = document.getElementById('matrix-body');
            body.innerHTML = Object.values(matrixData)
                .sort((a,b) => b.sc - a.sc) // Самые горячие монеты вверх
                .map(m => `
                    <tr class="coin-row">
                        <td style="color:var(--matrix-green); font-weight:bold;">${m.s}</td>
                        <td style="color:#fff;">${m.p.toFixed(4)}</td>
                        <td style="color:${m.d > 0 ? '#fff' : '#ff3e3e'}">${m.d}</td>
                        <td>
                            <span style="background:${m.sc > 70 ? '#00ff41' : 'transparent'}; color:${m.sc > 70 ? '#000' : '#00ff41'}; padding: 0 5px;">
                                ${m.sc}%
                            </span>
                        </td>
                    </tr>
                `).join('');
        }

        // ПОЛУЧЕНИЕ СИГНАЛОВ
        socket.on('new_signal', (s) => {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            card.className = 'signal-card';
            card.innerHTML = `
                <div style="font-size:10px; opacity:0.7">ALGO_SCORE: ${s.score}%</div>
                <div style="font-weight:bold; font-size:18px;">${s.symbol}</div>
                <div class="${s.type === 'LONG' ? 'type-long' : 'type-short'}" style="font-weight:bold; font-size:14px;">
                    [ ${s.type} // @${s.entry} ]
                </div>
                <div style="margin-top:8px; font-size:11px; color:#fff; border-top:1px solid rgba(0,255,65,0.2); padding-top:5px;">
                    TP: ${s.tp.toFixed(2)} | SL: ${s.sl.toFixed(2)}
                </div>
                <div style="font-size:9px; color:rgba(0,255,65,0.6); margin-top:5px;">
                    DETECTED: ${s.reason}
                </div>
            `;
            container.prepend(card);
            
            // Удаляем старые сигналы (больше 10), чтобы не лагало
            if (container.children.length > 10) container.lastChild.remove();

            // Дублируем в нижний поток данных
            const stream = document.getElementById('order-flow-stream');
            const log = document.createElement('div');
            log.innerHTML = `> [${new Date().toLocaleTimeString()}] ALERT: ${s.symbol} ${s.type} DETECTED`;
            stream.prepend(log);
        });
    </script>
</body>
</html>
