<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCULPTOR // ELITE_SNIPER_v7.2</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fcd535">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        :root {
            --binance-yellow: #fcd535;
            --binance-black: #0b0e11;
            --binance-gray: rgba(30, 35, 41, 0.8);
            --binance-green: #02c076;
            --binance-red: #f84960;
            --text-gray: #848e9c;
            --glass: rgba(11, 14, 17, 0.7);
            --neon-glow: 0 0 15px rgba(252, 213, 53, 0.15);
        }

        body {
            background-color: var(--binance-black);
            color: #eaecef;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            font-size: 13px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #161a1e 0%, #0b0e11 100%);
        }

        /* BINANCE PRELOADER */
        #loader {
            position: fixed; inset: 0; background: var(--binance-black); z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(20px);
        }
        .loader-logo { width: 60px; height: 60px; border: 4px solid var(--binance-yellow); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* PROFESSIONAL AUTH */
        #login-overlay {
            position: fixed; inset: 0; background: var(--binance-black); z-index: 5500;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { 
            padding: 40px; background: var(--binance-gray); border-radius: 24px; width: 90%; max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8); text-align: center;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05);
        }
        input { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px; 
            width: 100%; box-sizing: border-box; margin: 25px 0; outline: none; border-radius: 12px; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--binance-yellow); background: rgba(255,255,255,0.08); }
        button { 
            background: var(--binance-yellow); color: #000; border: none; padding: 16px; 
            font-weight: 700; cursor: pointer; width: 100%; border-radius: 12px; font-size: 16px; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(252, 213, 53, 0.3);
        }
        button:hover { background: #f0b90b; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(252, 213, 53, 0.4); }

        /* HEADER */
        .header { background: rgba(30, 35, 41, 0.95); padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        .header-logo { color: var(--binance-yellow); font-weight: 700; font-size: 20px; letter-spacing: -1px; text-shadow: 0 0 10px rgba(252, 213, 53, 0.2); }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            height: calc(100vh - 65px); gap: 2px; background: #2b3139;
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 1fr; height: auto; }
            .panel { height: auto; min-height: 450px; }
        }

        .panel { background: var(--binance-black); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .panel-title { padding: 14px 16px; font-size: 11px; color: var(--text-gray); font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(22, 26, 30, 0.5); letter-spacing: 1px; }

        /* ELITE MARKET WATCH */
        .market-list { flex: 1; overflow-y: auto; background: var(--binance-black); }
        .market-table { width: 100%; border-collapse: collapse; }
        .market-table th { text-align: left; padding: 14px 16px; font-size: 10px; color: var(--text-gray); position: sticky; top: 0; background: #161a1e; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .market-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 600; transition: 0.3s; }
        
        .price-up { color: var(--binance-green); background: rgba(2, 192, 118, 0.05); }
        .price-down { color: var(--binance-red); background: rgba(248, 73, 96, 0.05); }
        .price-up-flash { animation: flashGreen 0.8s ease-out; }
        .price-down-flash { animation: flashRed 0.8s ease-out; }
        @keyframes flashGreen { 0% { background: rgba(2, 192, 118, 0.3); } 100% { background: transparent; } }
        @keyframes flashRed { 0% { background: rgba(248, 73, 96, 0.3); } 100% { background: transparent; } }

        /* ELITE SIGNALS GLASSMORPISM */
        #signals-container { flex: 1; overflow-y: auto; padding: 20px; background: var(--binance-black); }
        .signal-card {
            background: var(--binance-gray); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative; animation: eliteFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transition: 0.3s;
        }
        .signal-card:hover { transform: translateY(-3px); border-color: var(--binance-yellow); box-shadow: var(--neon-glow); }
        
        @keyframes eliteFadeIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .tag { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-bottom: 12px; display: inline-block; letter-spacing: 0.5px; }
        .tag-long { background: rgba(2, 192, 118, 0.2); color: var(--binance-green); box-shadow: 0 0 10px rgba(2, 192, 118, 0.1); }
        .tag-short { background: rgba(248, 73, 96, 0.2); color: var(--binance-red); box-shadow: 0 0 10px rgba(248, 73, 96, 0.1); }

        .price-row { display: flex; justify-content: space-between; margin: 15px 0; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-label { font-size: 9px; color: var(--text-gray); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .p-val { font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }

        /* ELITE LOGS */
        .logs-box { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; color: var(--text-gray); line-height: 2; font-family: 'Inter', sans-serif; }
        .log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 6px; margin-bottom: 6px; display: flex; gap: 10px; }
        .log-time { color: var(--binance-yellow); opacity: 0.6; font-weight: 600; min-width: 65px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b424d; border-radius: 10px; }
    </style>
</head>
<body>

    <audio id="signal-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="loader">
        <div class="loader-logo"></div>
        <div style="margin-top: 25px; font-weight: 700; color: var(--binance-yellow); letter-spacing: 2px;" id="loader-msg">INITIALIZING_ELITE_v7.2...</div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <div class="header-logo" style="font-size: 28px; margin-bottom: 15px;">JSCULPTOR ELITE PRO</div>
            <div style="color: var(--text-gray); font-size: 13px; margin-bottom: 30px; letter-spacing: 1px;">INSTITUTIONAL_LIQUIDITY_SNIPER</div>
            <input type="password" id="pass" placeholder="Enter System Key" autofocus>
            <button onclick="login()">ESTABLISH_CONNECTION</button>
            <div id="login-status" style="margin-top: 25px; font-size: 12px; font-weight: 600;"></div>
        </div>
    </div>

    <div class="header">
        <div class="header-logo">JS_ELITE <span style="color:var(--text-gray); font-size:12px; font-weight:400; margin-left: 10px;">| elite.v7.2.pro</span></div>
        <div style="display: flex; gap: 25px; font-size: 11px; font-weight: 700;">
            <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px; background:var(--binance-green); border-radius:50%; box-shadow: 0 0 8px var(--binance-green);"></div> SNIPER_READY</div>
            <div>TREND: <span id="trend-status" style="color:var(--binance-yellow)">EMA_21_GUARD</span></div>
            <div>UPTIME: <span id="uptime-val" style="color:white">0s</span></div>
        </div>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="panel-title">MARKET_NODES_DETECTION</div>
            <div class="market-list">
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>ASSET</th>
                            <th>PRICE_USDT</th>
                            <th>SCORE</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div class="panel" style="border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);">
            <div class="panel-title">LIVE_SNIPER_SIGNALS (10M_ANTISPAM)</div>
            <div id="signals-container"></div>
        </div>

        <div class="panel">
            <div class="panel-title">CORE_SNIPER_TELEMETRY</div>
            <div id="hacker-logs" class="logs-box" style="display:flex; flex-direction:column-reverse;"></div>
            
            <div class="panel-title" style="border-top: 1px solid rgba(255,255,255,0.05);">NETWORK_TRAFFIC_PULSE</div>
            <div id="traffic-monitor" class="logs-box" style="height: 160px; opacity: 0.6;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const matrixData = {};

        // --- ELITE TELEMETRY LOGS ---
        const logLines = ["NODE_SCANNING: COMPLETED", "EMA_21_GUARD: ACTIVE", "LIQUIDITY_MAP: UPDATED", "SFP_DETECTION: STANDBY", "CVD_CLUSTER: ANALYZING", "CORE_v7.2: OPTIMIZED"];
        setInterval(() => {
            const logs = document.getElementById('hacker-logs');
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span> <span style="color:#eaecef">${logLines[Math.floor(Math.random()*logLines.length)]}</span>`;
            logs.prepend(div);
            if(logs.children.length > 40) logs.lastChild.remove();
        }, 3000);

        // SYSTEM HEARTBEAT
        socket.on('system_heartbeat', (data) => {
            document.getElementById('uptime-val').innerText = data.uptime + 's';
            const traffic = document.getElementById('traffic-monitor');
            traffic.innerHTML = `<div style="margin-bottom:4px;">>> PKT_LOAD: ${data.load}% | SNIPER_CORE: ${data.status}</div>` + traffic.innerHTML;
            if(traffic.innerHTML.length > 600) traffic.innerHTML = traffic.innerHTML.substring(0, 600);
        });

        // ELITE PRELOADER
        function startLoader() {
            const loader = document.getElementById('loader');
            const msg = document.getElementById('loader-msg');
            const steps = ["BOOTING_SNIPER_CORE...", "EMA_21_CALIBRATING...", "FETCHING_VIP_HISTORY...", "SYSTEM_READY"];
            loader.style.display = 'flex';
            let i = 0;
            const interval = setInterval(() => {
                msg.innerText = steps[i];
                i++;
                if(i >= steps.length) { clearInterval(interval); setTimeout(() => loader.style.display = 'none', 1000); }
            }, 600);
        }

        // AUTH & HISTORY
        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({code}) });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                startLoader();
                loadSignalHistory();
            } else {
                document.getElementById('login-status').innerHTML = "!! ACCESS_DENIED: UNAUTHORIZED_KEY !!";
                document.getElementById('login-status').style.color = "var(--binance-red)";
            }
        }

        async function loadSignalHistory() {
            try {
                const res = await fetch('/api/signals');
                const history = await res.json();
                history.reverse().forEach(s => renderSignalCard(s, true));
            } catch (err) { console.error("DB_HISTORY_FETCH_ERROR"); }
        }

        // ELITE SIGNAL CARD (GLASSMORPHISM)
        function renderSignalCard(s, isHistory = false) {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            card.className = `signal-card ${isHistory ? 'history' : ''}`;
            if(isHistory) card.style.opacity = "0.6";
            
            const isLong = s.type === 'LONG';
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <span class="tag ${isLong ? 'tag-long' : 'tag-short'}">${s.type} ${s.score}% CONFIDENCE</span>
                        <div style="font-size:22px; font-weight:800; color:white; letter-spacing:-0.5px;">${s.symbol.replace('USDT','')} <span style="font-size:11px; color:var(--text-gray); font-weight:400; margin-left:5px;">SNIPER_TARGET</span></div>
                    </div>
                    <div style="text-align:right; font-size:11px; color:var(--text-gray); font-weight:600;">
                        ${new Date(s.timestamp).toLocaleTimeString()}
                    </div>
                </div>
                
                <div class="price-row">
                    <div style="display:flex; flex-direction:column;">
                        <span class="p-label">ENTRY_PRICE</span>
                        <span class="p-val" style="color:white">${s.entry.toFixed(s.entry < 1 ? 5 : 2)}</span>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <span class="p-label">TAKE_PROFIT (1.5%)</span>
                        <span class="p-val" style="color:var(--binance-green)">${s.tp.toFixed(s.entry < 1 ? 5 : 2)}</span>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <span class="p-label">STOP_LOSS (0.5%)</span>
                        <span class="p-val" style="color:var(--binance-red)">${s.sl.toFixed(s.entry < 1 ? 5 : 2)}</span>
                    </div>
                </div>
                
                <div style="font-size:11px; color:var(--text-gray); font-weight:500;">
                    EXECUTION_LOGIC: <span style="color:#eaecef; font-weight:600;">${s.reason}</span>
                </div>
            `;
            
            if(isHistory) container.appendChild(card);
            else {
                container.prepend(card);
                document.getElementById('signal-sound').play().catch(e => console.log("Sound interaction needed"));
            }
            if (container.children.length > 30) container.lastChild.remove();
        }

        // MATRIX UPDATE (FIXED FOR v7.2)
        socket.on('matrix_update', (data) => {
            const old = matrixData[data.s];
            matrixData[data.s] = data;
            
            const body = document.getElementById('matrix-body');
            body.innerHTML = Object.values(matrixData)
                .sort((a,b) => b.sc - a.sc)
                .map(m => {
                    let cls = '';
                    if (old) {
                        if (m.p > old.p) cls = 'price-up-flash';
                        else if (m.p < old.p) cls = 'price-down-flash';
                    }

                    return `
                        <tr class="${cls}">
                            <td style="font-weight:700; color:white;">${m.s.replace('USDT','')}</td>
                            <td style="font-family:'Inter'; font-weight:700;">${m.p.toFixed(m.p < 1 ? 5 : 2)}</td>
                            <td>
                                <span style="color:${m.sc >= 80 ? 'var(--binance-yellow)' : 'white'}; font-weight:800;">
                                    ${m.sc}%
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');
        });

        // NEW LIVE SIGNAL
        socket.on('new_signal', (s) => {
            renderSignalCard(s);
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
        });
    </script>
</body>
</html>
