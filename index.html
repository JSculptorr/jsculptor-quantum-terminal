<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCULPTOR // MONOLITH_V6_PRO</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00ff41">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --matrix-green: #00ff41;
            --dark-bg: #000a00;
            --alert-red: #ff3e3e;
            --glow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        body {
            background: var(--dark-bg);
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            margin: 0; padding: 0;
            text-transform: uppercase;
            font-size: 11px;
            overflow-x: hidden;
        }

        /* CRT EFFECT */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 5000; background-size: 100% 3px, 3px 100%; pointer-events: none; opacity: 0.5;
        }

        /* HACKER PRELOADER */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .decrypt-text { font-size: 18px; margin-bottom: 20px; letter-spacing: 6px; text-shadow: var(--glow); }
        #progress-bar { width: 300px; height: 2px; background: #111; border: 1px solid var(--matrix-green); }
        #progress-fill { width: 0%; height: 100%; background: var(--matrix-green); box-shadow: 0 0 20px var(--matrix-green); }

        /* AUTH */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 5500;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { 
            padding: 40px; border: 1px solid var(--matrix-green); width: 90%; max-width: 400px;
            background: #000; position: relative; box-shadow: 0 0 40px rgba(0,255,65,0.2);
        }
        .login-box::before { content: "[ NODE_ACCESS_V6 ]"; position: absolute; top: -10px; left: 20px; background: #000; padding: 0 10px; font-size: 10px; }
        input { background: transparent; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 15px; width: 100%; box-sizing: border-box; margin: 20px 0; outline: none; font-family: inherit; }
        button { background: var(--matrix-green); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; letter-spacing: 2px; }
        button:hover { background: #fff; }

        /* LAYOUT - MONOLITH */
        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 360px;
            height: 100vh; gap: 8px; padding: 8px; box-sizing: border-box;
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 1fr; height: auto; overflow-y: visible; }
            body { overflow-y: auto; }
            .glass { height: auto; min-height: 400px; }
            .matrix-container { height: 550px !important; }
        }

        /* CYBER PANELS */
        .glass {
            background: rgba(0, 10, 0, 0.95);
            border: 1px solid rgba(0, 255, 65, 0.25);
            display: flex; flex-direction: column; position: relative;
        }
        .glass::after { content: ""; position: absolute; top: 0; right: 0; width: 10px; height: 10px; border-top: 2px solid var(--matrix-green); border-right: 2px solid var(--matrix-green); }
        .glass::before { content: ""; position: absolute; bottom: 0; left: 0; width: 10px; height: 10px; border-bottom: 2px solid var(--matrix-green); border-left: 2px solid var(--matrix-green); }

        .panel-header {
            background: rgba(0, 255, 65, 0.12);
            padding: 10px 15px; border-bottom: 1px solid var(--matrix-green);
            font-weight: bold; font-size: 10px; display: flex; justify-content: space-between;
        }

        /* MATRIX TABLE (20 COINS) */
        .matrix-container { flex: 1; overflow-y: auto; }
        .matrix-table { width: 100%; border-collapse: collapse; }
        .matrix-table th { text-align: left; padding: 12px; border-bottom: 1px solid var(--matrix-green); font-size: 9px; opacity: 0.5; position: sticky; top: 0; background: #000; }
        .matrix-table td { padding: 10px 12px; border-bottom: 1px solid rgba(0,255,65,0.05); }
        .coin-row:hover { background: rgba(0,255,65,0.08); }

        /* SIGNALS */
        #signals-container { flex: 1; overflow-y: auto; padding: 5px; }
        .signal-card {
            margin-bottom: 12px; padding: 15px; border: 1px solid var(--matrix-green);
            background: rgba(0, 30, 0, 0.5); position: relative;
            animation: emerge 0.4s ease-out;
        }
        @keyframes emerge { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .type-long { color: #fff; text-shadow: 0 0 10px var(--matrix-green); }
        .type-short { color: var(--alert-red); text-shadow: 0 0 10px var(--alert-red); }

        /* DIGITAL DECOR BLOCKS */
        .cyber-log { font-size: 9px; line-height: 1.5; padding: 10px; overflow: hidden; opacity: 0.8; }
        .freq-bar { height: 3px; background: var(--matrix-green); margin: 2px 0; transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="decrypt-text" id="loader-msg">INITIALIZING_V6_MONOLITH...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <div style="font-size: 16px; font-weight: bold;">> JSCULPTOR_SYSTEM_V6</div>
            <div style="font-size: 9px; opacity: 0.6; margin-top: 5px;">INSTITUTIONAL_DATA_PORTAL</div>
            <input type="password" id="pass" placeholder="DECRYPTION_KEY..." autofocus>
            <button onclick="login()">[ AUTHORIZE_SESSION ]</button>
            <div id="login-status" style="margin-top: 15px; font-size: 11px;"></div>
        </div>
    </div>

    <div class="layout">
        <div class="glass">
            <div class="panel-header"><span>NODE_TELEMETRY</span><span>V6.0.4</span></div>
            <div id="hacker-logs" class="cyber-log" style="flex:1; display:flex; flex-direction:column-reverse;"></div>
            <div style="padding:15px; border-top:1px solid rgba(0,255,65,0.2);">
                <div style="font-size:10px; margin-bottom:10px;">CORE_LOAD: <span id="cpu-val">0%</span></div>
                <div id="freq-container">
                    <div class="freq-bar" style="width: 40%"></div>
                    <div class="freq-bar" style="width: 70%"></div>
                    <div class="freq-bar" style="width: 50%"></div>
                </div>
            </div>
        </div>

        <div class="main-workspace">
            <div class="glass matrix-container">
                <div class="panel-header">GLOBAL_MARKET_MATRIX (20_NODES_LIVE)</div>
                <table class="matrix-table">
                    <thead>
                        <tr>
                            <th>ASSET</th>
                            <th>PRICE_USDT</th>
                            <th>ROLL_CVD</th>
                            <th>ALGO_SCORE</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
            
            <div class="glass" style="height: 120px;">
                <div class="panel-header">PACKET_SNIFFER_STREAM</div>
                <div id="order-flow-stream" class="cyber-log"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass" style="padding: 15px; border-bottom: 2px solid var(--matrix-green);">
                <h3 style="margin:0; font-size:14px; letter-spacing:1px;">INSTITUTIONAL_ALGO_V6</h3>
                <div id="status-bar" style="font-size:10px; opacity:0.6; margin-top:5px;">>> MONITORING_LIQUIDITY_FLOW</div>
            </div>
            <div id="signals-container"></div>
            <div class="glass" style="height: 100px;">
                <div class="panel-header">NETWORK_ENCRYPTION_STATUS</div>
                <div id="traffic-monitor" class="cyber-log" style="opacity:0.5;"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const matrixData = {};

        // --- ДЕКОРАТИВНЫЕ ХАКЕРСКИЕ ЛОГИ ---
        const logLines = ["SCANNING_BINANCE_CORE...", "INJECTING_ALGO_V6...", "BYPASSING_AUTH_LAYER...", "CVD_SYNC_SUCCESS", "SFP_SCAN_ACTIVE", "TRACING_SMART_MONEY"];
        setInterval(() => {
            const logs = document.getElementById('hacker-logs');
            const div = document.createElement('div');
            div.innerHTML = `> ${logLines[Math.floor(Math.random()*logLines.length)]}`;
            logs.prepend(div);
            if(logs.children.length > 25) logs.lastChild.remove();
        }, 1500);

        // ОБРАБОТКА ХАКЕРСКОГО ПУЛЬСА (ДАННЫЕ ОТ СЕРВЕРА)
        socket.on('system_heartbeat', (data) => {
            document.getElementById('cpu-val').innerText = data.cpu + '%';
            const bars = document.querySelectorAll('.freq-bar');
            bars.forEach(b => b.style.width = Math.random() * 100 + '%');
            
            const traffic = document.getElementById('traffic-monitor');
            traffic.innerHTML = `>> HASH: ${data.hash} | PKT: ${data.net}kb/s <br>` + traffic.innerHTML;
            if(traffic.innerHTML.length > 300) traffic.innerHTML = traffic.innerHTML.substring(0, 300);
        });

        // HACKER PRELOADER
        function startHackerLoader() {
            const loader = document.getElementById('loader');
            const fill = document.getElementById('progress-fill');
            const msg = document.getElementById('loader-msg');
            const steps = ["BOOTING_SHELL...", "BYPASSING_NODES...", "FETCHING_DB_HISTORY...", "SYNCING_MARKET...", "READY"];
            loader.style.display = 'flex';
            let progress = 0; let stepIdx = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 6;
                if (progress >= 100) { progress = 100; clearInterval(interval); setTimeout(() => loader.style.display = 'none', 600); }
                fill.style.width = progress + '%';
                if (progress > (stepIdx + 1) * 20 && stepIdx < steps.length - 1) { stepIdx++; msg.innerHTML = steps[stepIdx]; }
            }, 50);
        }

        // ВХОД И ЗАГРУЗКА ИСТОРИИ
        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({code}) });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                startHackerLoader();
                loadSignalHistory(); // Подтягиваем старые сигналы
            } else {
                document.getElementById('login-status').innerHTML = "!! BREACH_FAILED: UNAUTHORIZED !!";
                document.getElementById('login-status').style.color = "var(--alert-red)";
            }
        }

        // ФУНКЦИЯ ЗАГРУЗКИ ИСТОРИИ ИЗ БАЗЫ
        async function loadSignalHistory() {
            try {
                const res = await fetch('/api/signals');
                const history = await res.json();
                history.reverse().forEach(s => renderSignalCard(s, true));
            } catch (err) { console.error("History fetch error"); }
        }

        // УНИВЕРСАЛЬНАЯ ОТРИСОВКА КАРТОЧКИ
        function renderSignalCard(s, isHistory = false) {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            card.className = 'signal-card';
            if(isHistory) card.style.borderStyle = 'dashed'; 
            card.innerHTML = `
                <div style="font-size:9px; opacity:0.6">${isHistory ? '[HISTORY_LOG]' : '[LIVE_INTRUSION]'} // SCORE: ${s.score}%</div>
                <div style="font-weight:bold; font-size:18px; margin: 5px 0;">${s.symbol}</div>
                <div class="${s.type === 'LONG' ? 'type-long' : 'type-short'}" style="font-weight:bold; font-size:15px;">
                    >> ${s.type} @ ${s.entry}
                </div>
                <div style="margin-top:10px; font-size:10px; color:#fff; border-top:1px solid rgba(0,255,65,0.2); padding-top:8px;">
                    TP: ${s.tp.toFixed(3)} | SL: ${s.sl.toFixed(3)}
                </div>
                <div style="font-size:9px; color:rgba(0,255,65,0.5); margin-top:5px; line-height:1.2;">
                    LOGIC: ${s.reason}
                </div>
            `;
            if(isHistory) container.appendChild(card);
            else container.prepend(card);
            if (container.children.length > 20) container.lastChild.remove();
        }

        // ОБНОВЛЕНИЕ МАТРИЦЫ (20 МОНЕТ)
        socket.on('matrix_update', (data) => {
            matrixData[data.s] = data;
            const body = document.getElementById('matrix-body');
            body.innerHTML = Object.values(matrixData)
                .sort((a,b) => b.sc - a.sc)
                .map(m => `
                    <tr class="coin-row">
                        <td style="color:var(--matrix-green); font-weight:bold;">${m.s.replace('USDT','')}</td>
                        <td style="color:#fff;">${m.p.toFixed(m.p < 1 ? 5 : 2)}</td>
                        <td style="color:${m.d > 0 ? '#fff' : '#ff3e3e'}">${m.d}</td>
                        <td><span style="background:${m.sc >= 80 ? '#00ff41' : 'transparent'}; color:${m.sc >= 80 ? '#000' : '#00ff41'}; padding: 2px 6px;">${m.sc}%</span></td>
                    </tr>
                `).join('');
        });

        // НОВЫЙ СИГНАЛ
        socket.on('new_signal', (s) => {
            renderSignalCard(s);
            const stream = document.getElementById('order-flow-stream');
            const log = document.createElement('div');
            log.innerHTML = `> [${new Date().toLocaleTimeString()}] INTRUSION_ALERT: ${s.symbol} DETECTED`;
            stream.prepend(log);
            if(stream.children.length > 15) stream.lastChild.remove();
        });
    </script>
</body>
</html>
