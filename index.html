<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSculptor // MARKET_INTRUSION_OS</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --matrix-green: #00ff41;
            --dark-bg: #000a00;
            --terminal-gray: #1a1a1a;
            --alert-red: #ff3e3e;
        }

        body {
            background: var(--dark-bg);
            color: var(--matrix-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Сканирующая линия (CRT эффект) */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glass {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            border-radius: 2px;
        }

        /* LOGIN SCREEN */
        #login-overlay {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { padding: 40px; border: 2px solid var(--matrix-green); text-align: left; width: 400px; }
        input { 
            background: transparent; border: none; border-bottom: 2px solid var(--matrix-green); 
            color: var(--matrix-green); padding: 10px; width: 100%; margin: 20px 0; outline: none; font-family: inherit;
        }
        button { 
            background: var(--matrix-green); color: #000; border: none; padding: 10px 20px; 
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--matrix-green); }

        /* GRID LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 250px 1fr 350px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* DECORATIVE SYSTEM LOGS */
        .system-logs {
            font-size: 10px;
            overflow: hidden;
            padding: 10px;
            color: rgba(0, 255, 65, 0.5);
            display: flex;
            flex-direction: column-reverse;
        }

        /* CHARTS & SIGNALS */
        .main-workspace { display: flex; flex-direction: column; gap: 10px; }
        #chart { flex: 1; min-height: 400px; }
        
        .sidebar { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .signal-card {
            padding: 15px; border: 1px solid var(--matrix-green);
            background: rgba(0, 40, 0, 0.4);
            position: relative;
            margin-bottom: 10px;
        }
        .signal-card::before {
            content: "[ SIGNAL_DETECTED ]";
            position: absolute; top: -8px; left: 10px; background: var(--dark-bg);
            font-size: 9px; padding: 0 5px;
        }

        .type-long { color: #fff; text-shadow: 0 0 10px var(--matrix-green); }
        .type-short { color: var(--alert-red); text-shadow: 0 0 10px var(--alert-red); }

        h3, h4 { margin: 0; border-bottom: 1px solid var(--matrix-green); padding-bottom: 5px; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <div>> SYSTEM: ACCESS_RESTRICTED</div>
            <div>> USER_ID: JSculptor_Admin</div>
            <input type="password" id="pass" placeholder="ENTER_ENCRYPTION_KEY..." autofocus>
            <button onclick="login()">[ EXECUTE_ACCESS ]</button>
            <div id="login-status" style="margin-top: 10px; font-size: 12px;"></div>
        </div>
    </div>

    <div class="layout">
        <div class="glass system-logs" id="hacker-logs">
            </div>

        <div class="main-workspace">
            <div class="glass" id="chart"></div>
            <div class="glass" style="height: 150px; padding: 15px; font-size: 11px;">
                <h4>> LIVE_MARKET_PENETRATION</h4>
                <div id="order-flow-stream"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass" style="padding: 15px;">
                <h3>SCULPTOR_ALGO_V3</h3>
                <div id="status-bar">> STATUS: MONITORING_LIQUIDITY</div>
            </div>
            <div id="signals-container"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let chart, candleSeries;

        // --- ДЕКОРАТИВНЫЕ ХАКЕРСКИЕ ЛОГИ ---
        const logLines = [
            "SCANNING BINANCE_SERVER_04...",
            "LIQUIDITY_VOID_DETECTED: 1.4M USDT",
            "BYPASSING ORDER_THROTTLING...",
            "NEURAL_NET: ANALYZING_CVD_MOMENTUM",
            "ENCRYPTION_LAYER: ACTIVE",
            "SFP_PATTERN_SEARCH: BTC/USDT",
            "ABSORPTION_CLUSTER_FOUND: 44.2 BTC",
            "RETRACING_SMART_MONEY_FOOTPRINTS...",
            "PING: 14ms | PACKET_LOSS: 0%",
            "INSTITUTIONAL_WALL_FOUND @ $67,400"
        ];

        function addHackerLog() {
            const container = document.getElementById('hacker-logs');
            const div = document.createElement('div');
            div.innerHTML = `> ${logLines[Math.floor(Math.random() * logLines.length)]}`;
            container.prepend(div);
            if (container.children.length > 50) container.lastChild.remove();
        }
        setInterval(addHackerLog, 2000);

        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({code}) 
            });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                initChart();
            } else {
                document.getElementById('login-status').innerHTML = "!! ACCESS_DENIED: INVALID_KEY !!";
                document.getElementById('login-status').style.color = "red";
            }
        }

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { backgroundColor: '#000', textColor: '#00ff41' },
                grid: { vertLines: { color: '#002200' }, horzLines: { color: '#002200' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: true }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff41', downColor: '#ff0000', borderVisible: false,
                wickUpColor: '#00ff41', wickDownColor: '#ff0000'
            });
        }

        socket.on('new_signal', (s) => {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            card.className = 'signal-card';
            card.innerHTML = `
                <div style="font-size:10px; opacity:0.7">SCORE: ${s.score}%</div>
                <div style="font-weight:bold; font-size:16px;">${s.symbol}</div>
                <div class="${s.type === 'LONG' ? 'type-long' : 'type-short'}" style="font-weight:bold">
                    [ ${s.type} // ENTRY: ${s.entry} ]
                </div>
                <div style="margin-top:5px; font-size:11px; opacity:0.8">
                    TP: ${s.tp.toFixed(2)} | SL: ${s.sl.toFixed(2)}
                </div>
                <div style="font-size:10px; color:rgba(0,255,65,0.6); margin-top:5px;">
                    REASON: ${s.reason}
                </div>
            `;
            container.prepend(card);
            
            // Звук уведомления (опционально)
            // new Audio('https://www.soundjay.com/buttons/beep-01a.mp3').play();
        });
    </script>
</body>
</html>
