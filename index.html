<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSCULPTOR // SURGEON_v8.1_SMC</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fcd535">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --binance-yellow: #fcd535;
            --binance-black: #0b0e11;
            --binance-gray: rgba(30, 35, 41, 0.7);
            --binance-green: #02c076;
            --binance-red: #f84960;
            --text-gray: #848e9c;
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-shadow-long: 0 0 20px rgba(2, 192, 118, 0.15);
            --neon-shadow-short: 0 0 20px rgba(248, 73, 96, 0.15);
        }

        body {
            background-color: var(--binance-black);
            color: #eaecef;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            font-size: 13px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 100% 0%, #1e2329 0%, #0b0e11 100%);
        }

        /* ELITE PRELOADER */
        #loader {
            position: fixed; inset: 0; background: var(--binance-black); z-index: 6000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(25px);
        }
        .loader-logo { width: 50px; height: 50px; border: 3px solid var(--binance-yellow); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* AUTH BOX */
        #login-overlay {
            position: fixed; inset: 0; background: var(--binance-black); z-index: 5500;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { 
            padding: 40px; background: var(--binance-gray); border-radius: 28px; width: 90%; max-width: 380px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9); text-align: center;
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
        }
        input { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 18px; 
            width: 100%; box-sizing: border-box; margin: 25px 0; outline: none; border-radius: 14px; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--binance-yellow); background: rgba(0,0,0,0.5); }
        button { 
            background: var(--binance-yellow); color: #000; border: none; padding: 18px; 
            font-weight: 800; cursor: pointer; width: 100%; border-radius: 14px; font-size: 16px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(252, 213, 53, 0.2);
        }
        button:hover { background: #f0b90b; transform: scale(1.02); }

        /* HEADER */
        .header { background: rgba(22, 26, 30, 0.95); padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .header-logo { color: var(--binance-yellow); font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            height: calc(100vh - 65px); gap: 1px; background: rgba(255,255,255,0.03);
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 1fr; height: auto; }
            .panel { height: auto; min-height: 450px; }
        }

        .panel { background: var(--binance-black); display: flex; flex-direction: column; overflow: hidden; }
        .panel-title { padding: 14px 18px; font-size: 11px; color: var(--text-gray); font-weight: 800; border-bottom: 1px solid var(--glass-border); background: rgba(22, 26, 30, 0.6); text-transform: uppercase; letter-spacing: 1.5px; }

        /* MARKET MATRIX */
        .market-list { flex: 1; overflow-y: auto; background: var(--binance-black); }
        .market-table { width: 100%; border-collapse: collapse; }
        .market-table th { text-align: left; padding: 14px 18px; font-size: 10px; color: var(--text-gray); position: sticky; top: 0; background: #0b0e11; z-index: 10; border-bottom: 1px solid var(--glass-border); }
        .market-table td { padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 700; transition: 0.3s; }
        
        .price-up-flash { animation: eliteFlashGreen 0.7s ease-out; color: var(--binance-green); }
        .price-down-flash { animation: eliteFlashRed 0.7s ease-out; color: var(--binance-red); }
        @keyframes eliteFlashGreen { 0% { background: rgba(2, 192, 118, 0.3); } 100% { background: transparent; } }
        @keyframes eliteFlashRed { 0% { background: rgba(248, 73, 96, 0.3); } 100% { background: transparent; } }

        /* SURGEON CARDS */
        #signals-container { flex: 1; overflow-y: auto; padding: 20px; background: #07090b; }
        .signal-card {
            background: var(--binance-gray); border-radius: 24px; padding: 22px; margin-bottom: 22px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(20px);
            position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardFadeUp 0.6s ease-out;
        }
        .signal-card:hover { transform: translateY(-5px) scale(1.01); }
        
        .card-long { border-left: 6px solid var(--binance-green); box-shadow: var(--neon-shadow-long); }
        .card-short { border-left: 6px solid var(--binance-red); box-shadow: var(--neon-shadow-short); }

        @keyframes cardFadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 9px; padding: 4px 10px; border-radius: 6px; font-weight: 800; margin-right: 6px; margin-bottom: 8px; display: inline-block; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .tag-main { background: var(--binance-yellow); color: #000; border: none; font-size: 10px; padding: 5px 12px; }
        .tag-smc { background: rgba(255,255,255,0.05); color: #fff; }

        .price-row { display: flex; justify-content: space-between; margin: 18px 0; padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.06); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .p-label { font-size: 9px; color: var(--text-gray); font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .p-val { font-weight: 800; font-size: 17px; color: white; }

        /* LOGS */
        .logs-box { flex: 1; overflow-y: auto; padding: 15px; font-size: 11px; color: var(--text-gray); line-height: 2; }
        .log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 5px; margin-bottom: 5px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3b424d; border-radius: 10px; }
    </style>
</head>
<body>

    <audio id="signal-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="loader">
        <div class="loader-logo"></div>
        <div style="margin-top: 25px; font-weight: 800; color: var(--binance-yellow); letter-spacing: 3px;" id="loader-msg">SURGEON_BOOTING_V8.1...</div>
    </div>

    <div id="login-overlay">
        <div class="login-box">
            <div class="header-logo" style="font-size: 30px; margin-bottom: 10px;">JSCULPTOR SURGEON</div>
            <div style="color: var(--text-gray); font-size: 13px; margin-bottom: 30px; font-weight: 600;">SMC_PRICE_ACTION_v8.1</div>
            <input type="password" id="pass" placeholder="Authorization Key" autofocus>
            <button onclick="login()">ESTABLISH_NEURAL_LINK</button>
            <div id="login-status" style="margin-top: 25px; font-size: 12px; font-weight: 700;"></div>
        </div>
    </div>

    <div class="header">
        <div class="header-logo">JS_SURGEON <span style="color:var(--text-gray); font-size:12px; font-weight:400; margin-left: 10px;">| engine.v8.1.smc</span></div>
        <div style="display: flex; gap: 25px; font-size: 11px; font-weight: 800;">
            <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px; background:var(--binance-green); border-radius:50%; box-shadow: 0 0 10px var(--binance-green);"></div> MTF_ACTIVE</div>
            <div>CORE: <span id="trend-status" style="color:var(--binance-yellow)">WARMING_UP</span></div>
            <div>UPTIME: <span id="uptime-val" style="color:white">0s</span></div>
        </div>
    </div>

    <div class="layout">
        <div class="panel">
            <div class="panel-title">MARKET_STRUCTURE_WATCH</div>
            <div class="market-list">
                <table class="market-table">
                    <thead>
                        <tr>
                            <th>ASSET</th>
                            <th>PRICE_USDT</th>
                            <th>STRUCTURE</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
        </div>

        <div class="panel" style="border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);">
            <div class="panel-title">SMC_SIGNALS (INSTITUTIONAL_FLOW)</div>
            <div id="signals-container"></div>
        </div>

        <div class="panel">
            <div class="panel-title">SURGEON_EXECUTION_LOGS</div>
            <div id="hacker-logs" class="logs-box" style="display:flex; flex-direction:column-reverse;"></div>
            
            <div class="panel-title" style="border-top: 1px solid rgba(255,255,255,0.05);">DATA_STREAM_PULSE</div>
            <div id="traffic-monitor" class="logs-box" style="height: 160px; opacity: 0.6;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const matrixData = {};

        // CORE LOGS (Updated for v8.1)
        const logLines = ["SMC_ALGO: SEARCHING_OB", "BOS_DETECTED: STABLE", "FVG_GAP: MAPPING", "LIQUIDITY_SWEEP: WATCHING", "MTF_SCAN: 1m/5m/15m"];
        setInterval(() => {
            const logs = document.getElementById('hacker-logs');
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span style="color:var(--binance-yellow); font-weight:700;">[${new Date().toLocaleTimeString()}]</span> ${logLines[Math.floor(Math.random()*logLines.length)]}`;
            logs.prepend(div);
            if(logs.children.length > 40) logs.lastChild.remove();
        }, 3500);

        // SYSTEM HEARTBEAT
        socket.on('system_heartbeat', (data) => {
            document.getElementById('uptime-val').innerText = data.uptime + 's';
            document.getElementById('trend-status').innerText = 'OPERATING';
            const traffic = document.getElementById('traffic-monitor');
            traffic.innerHTML = `<div>>> SURGEON_V8.1: ${data.load}% | STATUS: ${data.status}</div>` + traffic.innerHTML;
            if(traffic.innerHTML.length > 600) traffic.innerHTML = traffic.innerHTML.substring(0, 600);
        });

        // PRELOADER
        function startLoader() {
            const loader = document.getElementById('loader');
            const msg = document.getElementById('loader-msg');
            const steps = ["SCANNING_STRUCTURE...", "MAPPING_ORDER_BLOCKS...", "FINALIZING_POI...", "READY"];
            loader.style.display = 'flex';
            let i = 0;
            const interval = setInterval(() => {
                msg.innerText = steps[i];
                i++;
                if(i >= steps.length) { clearInterval(interval); setTimeout(() => loader.style.display = 'none', 1000); }
            }, 600);
        }

        // AUTH & HISTORY
        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({code}) });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                startLoader();
                loadSignalHistory();
            } else {
                document.getElementById('login-status').innerHTML = "!! NEURAL_AUTH_FAILED !!";
                document.getElementById('login-status').style.color = "var(--binance-red)";
            }
        }

        async function loadSignalHistory() {
            try {
                const res = await fetch('/api/signals');
                const history = await res.json();
                history.reverse().forEach(s => renderSignalCard(s, true));
            } catch (err) { console.error("DB_HISTORY_FETCH_ERROR"); }
        }

        // SURGEON CARD RENDER
        function renderSignalCard(s, isHistory = false) {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            const isLong = s.type === 'LONG';
            card.className = `signal-card ${isLong ? 'card-long' : 'card-short'}`;
            if(isHistory) card.style.opacity = "0.5";
            
            // Парсим причины в теги
            const reasonsTags = s.reason.split(' | ').map(r => `<span class="tag tag-smc">${r}</span>`).join('');
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div>
                        <span class="tag tag-main">${s.type} ${s.score}% CONFIRMED</span>
                        <div style="font-size:24px; font-weight:800; color:white; letter-spacing:-0.5px; margin-top:5px;">${s.symbol.replace('USDT','')}</div>
                    </div>
                    <div style="text-align:right; font-size:11px; color:var(--text-gray); font-weight:700;">
                        ${new Date(s.timestamp).toLocaleTimeString()}
                    </div>
                </div>
                
                <div class="price-row">
                    <div><div class="p-label">ENTRY_ZONE</div><div class="p-val">${s.entry.toFixed(s.entry < 1 ? 5 : 2)}</div></div>
                    <div><div class="p-label">SMC_TARGET</div><div class="p-val" style="color:var(--binance-green)">${s.tp.toFixed(s.entry < 1 ? 5 : 2)}</div></div>
                    <div><div class="p-label">SURGEON_STOP</div><div class="p-val" style="color:var(--binance-red)">${s.sl.toFixed(s.entry < 1 ? 5 : 2)}</div></div>
                </div>
                
                <div style="display:flex; flex-wrap:wrap; margin-top:10px;">
                    ${reasonsTags}
                </div>
            `;
            
            if(isHistory) container.appendChild(card);
            else {
                container.prepend(card);
                document.getElementById('signal-sound').play().catch(e => {});
            }
            if (container.children.length > 30) container.lastChild.remove();
        }

        // MATRIX UPDATE (v8.1 Surgeon Sync)
        socket.on('matrix_update', (data) => {
            const old = matrixData[data.s];
            matrixData[data.s] = data;
            
            const body = document.getElementById('matrix-body');
            body.innerHTML = Object.values(matrixData)
                .sort((a,b) => b.sc - a.sc)
                .map(m => {
                    let flash = '';
                    if (old) {
                        if (m.p > old.p) flash = 'price-up-flash';
                        else if (m.p < old.p) flash = 'price-down-flash';
                    }

                    // Обновленная логика статуса: Если sc >= 95, значит BOS найден
                    let statusText = m.sc >= 95 ? 'SMC_BOS' : 'SCANNING';
                    let statusColor = m.sc >= 95 ? 'var(--binance-yellow)' : 'var(--text-gray)';

                    return `
                        <tr>
                            <td style="font-weight:800; color:white;">${m.s.replace('USDT','')}</td>
                            <td class="${flash}" style="font-weight:700; font-family:'Inter'">${m.p.toFixed(m.p < 1 ? 5 : 2)}</td>
                            <td>
                                <span style="color:${statusColor}; font-weight:800;">
                                    ${statusText}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');
        });

        // NEW SIGNAL
        socket.on('new_signal', (s) => {
            renderSignalCard(s);
            if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
        });
    </script>
</body>
</html>
