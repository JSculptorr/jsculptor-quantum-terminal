<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JSculptor Scalping Terminal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: rgba(255, 255, 255, 0.03); --accent: #fcd535; --green: #02c076; --red: #cf304a; }
        body { background: var(--bg); color: #eaecef; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        
        /* Login Screen */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { padding: 40px; text-align: center; width: 320px; }
        input { background: #1e2329; border: 1px solid #474d57; color: white; padding: 12px; width: 80%; border-radius: 4px; margin-bottom: 20px; outline: none; }
        button { background: var(--accent); color: black; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Main Layout */
        .layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; }
        .chart-section { display: flex; flex-direction: column; gap: 10px; }
        .sidebar { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }

        .signal-card { padding: 15px; border-left: 4px solid var(--accent); position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .type-long { color: var(--green); }
        .type-short { color: var(--red); }
        .score-badge { position: absolute; top: 15px; right: 15px; background: rgba(252, 213, 53, 0.2); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .reason { font-size: 12px; color: #848e9c; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box glass">
            <h2 style="margin-top:0">JSculptor <span style="color:var(--accent)">AI</span></h2>
            <p style="color:#848e9c">Institutional Scalping Terminal</p>
            <input type="password" id="pass" placeholder="Access Code">
            <button onclick="login()">UNSEAL ACCESS</button>
        </div>
    </div>

    <div class="layout">
        <div class="chart-section">
            <div id="main-chart" class="glass" style="flex: 1;"></div>
            <div id="order-flow" class="glass" style="height: 200px; padding: 15px;">
                <h4 style="margin:0 0 10px 0">Live Order Flow</h4>
                <div id="flow-content" style="font-family: monospace; font-size: 11px; color: var(--green)"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="glass" style="padding: 15px;">
                <h3 style="margin:0">Signals Engine</h3>
                <p style="font-size: 12px; color: #848e9c">Minimum Score: 80</p>
            </div>
            <div id="signals-container"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let chart, candleSeries;

        async function login() {
            const code = document.getElementById('pass').value;
            const res = await fetch('/api/auth', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({code}) 
            });
            if (res.ok) {
                document.getElementById('login-overlay').style.display = 'none';
                initChart();
            } else alert("Invalid Access Code");
        }

        function initChart() {
            chart = LightweightCharts.createChart(document.getElementById('main-chart'), {
                layout: { backgroundColor: 'transparent', textColor: '#848e9c' },
                grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { timeVisible: true, secondsVisible: true }
            });
            candleSeries = chart.addCandlestickSeries({
                upColor: '#02c076', downColor: '#cf304a', borderVisible: false,
                wickUpColor: '#02c076', wickDownColor: '#cf304a'
            });
        }

        socket.on('new_signal', (s) => {
            const container = document.getElementById('signals-container');
            const card = document.createElement('div');
            card.className = 'signal-card glass';
            card.innerHTML = `
                <div class="score-badge">${s.score}% Match</div>
                <div style="font-weight:bold; font-size:18px;">${s.symbol}</div>
                <div class="${s.type === 'LONG' ? 'type-long' : 'type-short'}" style="font-weight:bold">${s.type} @ ${s.entry}</div>
                <div style="margin-top:8px; font-size:13px;">
                    TP: <span class="type-long">${s.tp.toFixed(2)}</span> | 
                    SL: <span class="type-short">${s.sl.toFixed(2)}</span>
                </div>
                <div class="reason">${s.reason}</div>
            `;
            container.prepend(card);

            // Ограничение количества карточек
            if (container.children.length > 10) container.lastChild.remove();
        });
    </script>
</body>
</html>
